name: Test Release Publish

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Get npm cache
        id: npm-cache
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ubuntu-latest-node-22.x-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ubuntu-latest-node-22.x-npm-
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: https://registry.npmjs.org/
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test

  release_publish:
    name: Release to Github and publish to NPM
    runs-on: ubuntu-latest
    needs: test
    if: success() && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get npm cache
        id: npm-cache
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache.outputs.dir }}
          key: ubuntu-latest-node-24.x-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ubuntu-latest-node-24.x-npm-
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org/
      - name: Install
        run: npm ci
      - name: Setup env vars
        id: ownEnvVars
        run: |
          PACKAGE_VERSION=$(node -p -e "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV
          echo "COMMIT_LOG<<EOF" >> $GITHUB_ENV
          git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --format='- %s (%an)' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Check if version already released
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ env.PACKAGE_VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - uses: ncipollo/release-action@v1
        if: steps.check_tag.outputs.exists == 'false'
        with:
          tag: ${{ env.PACKAGE_VERSION }}
          commit: main
          body: ${{ env.COMMIT_LOG }}
      - name: npm publish
        if: steps.check_tag.outputs.exists == 'false'
        run: npm publish
